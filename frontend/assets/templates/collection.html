{{define "page"}}
<section class="page-heading">
  <p class="eyebrow">Owned figures</p>
  <h1>My Collection</h1>
  <p>Everything you have marked as owned.</p>
</section>

{{if .Figurines}}
  {{template "figurine_grid" .}}
{{else}}
  <section class="empty-state">
    <h2>No figurines yet.</h2>
    <p>Search the catalog and add the ones you already have.</p>
    <a class="button primary" href="/search">Start searching</a>
  </section>
{{end}}
{{end}}
